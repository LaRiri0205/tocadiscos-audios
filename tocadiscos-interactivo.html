<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tocadiscos Interactivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            gap: 60px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1400px;
        }

        /* ===== ESTANTERÍA DE ÁLBUMES ===== */
        .album-shelf {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid #e94560;
            min-width: 400px;
        }

        .shelf-title {
            color: #e94560;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .albums-display {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            height: 400px;
        }

        .album-item {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .album-item:hover {
            transform: translateY(-10px);
        }

        /* Empaque del álbum (cubierta) */
        .album-package {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.3) 100%);
            border: 2px solid #e94560;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .album-package img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 4px;
        }

        /* Tamaños diferentes */
        .album-item.size-small .album-package {
            width: 120px;
            height: 140px;
        }

        .album-item.size-medium .album-package {
            width: 140px;
            height: 160px;
        }

        .album-item.size-large .album-package {
            width: 160px;
            height: 180px;
        }

        .album-item.selected .album-package {
            border-color: #4caf50;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.6);
            transform: scale(1.05);
        }

        .album-label {
            color: #e94560;
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            font-weight: bold;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== TOCADISCOS ===== */
        .turntable-section {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            border: 3px solid #333;
            min-width: 500px;
            position: relative;
        }

        .turntable-title {
            color: #e94560;
            font-size: 18px;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Base física del tocadiscos */
        .turntable-body {
            background: linear-gradient(135deg, #3a3a3a 0%, #1a1a1a 100%);
            border: 3px solid #555;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 2px 5px rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .record-player {
            position: relative;
            width: 350px;
            height: 280px;
            margin: 0 auto 30px;
            background: radial-gradient(circle at 50% 30%, #555, #1a1a1a);
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.8);
            border: 2px solid #444;
        }

        /* Plato giratorio */
        .turntable-plate {
            position: absolute;
            width: 280px;
            height: 280px;
            top: 0;
            left: 35px;
            background: radial-gradient(circle at 30% 30%, #5a5a5a, #0a0a0a);
            border-radius: 50%;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 -5px 20px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .turntable-plate.spinning {
            animation: spin 3s linear infinite;
        }

        .turntable-plate.spinning.fast {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .vinyl-disc {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #333, #000);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #111;
            box-shadow: inset 0 -3px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .vinyl-disc::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(
                    circle at center,
                    rgba(255, 255, 255, 0.02) 0px,
                    rgba(255, 255, 255, 0.02) 2px,
                    transparent 2px,
                    transparent 4px
                );
            pointer-events: none;
        }

        .vinyl-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .vinyl-disc.with-cover .vinyl-cover {
            opacity: 1;
        }

        /* Brazo del tocadiscos */
        .tonearm-base {
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #666, #333);
            bottom: 20px;
            right: 30px;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            z-index: 20;
        }

        .tonearm {
            position: absolute;
            width: 16px;
            height: 180px;
            background: linear-gradient(135deg, #444, #222);
            bottom: 50px;
            right: 35px;
            transform-origin: bottom center;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            transition: transform 0.5s ease;
            z-index: 15;
        }

        .tonearm.in-rest {
            transform: rotate(35deg);
        }

        .tonearm.playing {
            transform: rotate(-5deg);
        }

        /* Aguja realista */
        .stylus {
            position: absolute;
            width: 3px;
            height: 35px;
            background: linear-gradient(to bottom, #ffdd00 0%, #ffbb00 50%, #ff8800 100%);
            bottom: -20px;
            left: 6.5px;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 200, 0, 0.8), 
                        0 2px 10px rgba(255, 150, 0, 0.6),
                        inset 0 1px 2px rgba(255, 255, 255, 0.4);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        /* Punta de la aguja */
        .stylus::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 8px;
            background: linear-gradient(to bottom, #ffdd00, #ff6600);
            bottom: -6px;
            left: 0.5px;
            border-radius: 50%;
            box-shadow: 0 1px 3px rgba(255, 100, 0, 0.8);
        }

        /* Vinilo flotante animado */
        .floating-vinyl {
            position: fixed;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            cursor: grab;
            z-index: 100;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.8));
            animation: float 3s ease-in-out infinite;
            overflow: hidden;
        }

        .floating-vinyl.dragging {
            animation: none;
            cursor: grabbing;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotateZ(0deg);
            }
            50% {
                transform: translateY(-25px) rotateZ(15deg);
            }
        }

        .floating-vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #333, #000);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #222;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
            background-image: var(--disc-image);
            background-size: cover;
            background-position: center;
        }

        /* Controles */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-play {
            background: linear-gradient(135deg, #e94560 0%, #c1213d 100%);
            color: white;
        }

        .btn-play:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-play:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-stop {
            background: linear-gradient(135deg, #666 0%, #333 100%);
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(100, 100, 100, 0.6);
        }

        .btn-stop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Info */
        .info-box {
            background: rgba(233, 69, 96, 0.1);
            border: 2px solid #e94560;
            padding: 15px;
            border-radius: 8px;
            color: #e94560;
            text-align: center;
            font-size: 13px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .info-box.success {
            background: rgba(76, 175, 80, 0.1);
            border-color: #4caf50;
            color: #4caf50;
        }

        .info-box.warning {
            background: rgba(255, 193, 7, 0.1);
            border-color: #ffc107;
            color: #ffc107;
        }

        /* Audio player oculto */
        audio {
            display: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                gap: 30px;
            }

            .turntable-section {
                min-width: auto;
            }

            .album-shelf {
                min-width: auto;
            }

            .record-player {
                width: 300px;
                height: 240px;
            }

            .turntable-plate {
                width: 230px;
                height: 230px;
                left: 35px;
            }

            .vinyl-disc {
                width: 200px;
                height: 200px;
            }
        }

        @media (max-width: 768px) {
            .album-shelf {
                padding: 20px;
            }

            .turntable-section {
                padding: 20px;
            }

            .record-player {
                width: 280px;
                height: 220px;
            }

            .albums-display {
                height: 320px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- ESTANTERÍA DE ÁLBUMES -->
        <div class="album-shelf">
            <div class="shelf-title">Mi Colección</div>
            <div class="albums-display" id="albumsDisplay"></div>
            <div class="status-message" id="shelfStatus">👆 Selecciona un vinilo</div>
        </div>

        <!-- TOCADISCOS -->
        <div class="turntable-section">
            <div class="turntable-title">Tocadiscos</div>
            
            <div class="turntable-body">
                <div class="record-player">
                    <div class="turntable-plate" id="turntable">
                        <div class="vinyl-disc" id="vinyDisc">
                            <div class="vinyl-cover"></div>
                        </div>
                    </div>
                    
                    <div class="tonearm in-rest" id="tonearm">
                        <div class="stylus"></div>
                    </div>
                    <div class="tonearm-base"></div>
                </div>

                <div class="controls">
                    <button class="btn btn-play" id="playBtn" onclick="playRecord()" disabled>▶ Reproducir</button>
                    <button class="btn btn-stop" id="stopBtn" onclick="stopRecord()" disabled>⏹ Detener</button>
                </div>

                <div class="info-box" id="infoBox">
                    👆 Selecciona un vinilo de la colección
                </div>
            </div>
        </div>
    </div>

    <!-- Audio player -->
    <audio id="audioPlayer" crossOrigin="anonymous"></audio>

    <script>
        // ===== CONFIGURACIÓN DE ÁLBUMES =====
        const albums = [
            {
                id: 1,
                name: 'This Music May Contain Hope',
                size: 'medium',
                cover: 'https://i.imgur.com/TCvjeJA.png',
                disc: 'https://i.imgur.com/udPqNSz.png',
                song: 'Nightingale Lane',
                audioUrl: 'https://www.mediafire.com/file/rtdj4gsoszleaem/Nightingale_Lane..mp3/file'
            },
            {
                id: 2,
                name: 'The Romantic',
                size: 'large',
                cover: 'https://i.imgur.com/STxSUdH.jpeg',
                disc: 'https://i.imgur.com/j0lv7Jl.png',
                song: 'Risk It All',
                audioUrl: 'https://www.mediafire.com/file/cvi2vjcnkw36afs/Risk_It_All.mp3/file'
            },
            {
                id: 3,
                name: 'The Art of Loving',
                size: 'small',
                cover: 'https://i.imgur.com/4A6WSum.png',
                disc: 'https://i.imgur.com/6fE8pKV.png',
                song: 'Man I Need',
                audioUrl: 'https://www.mediafire.com/file/54wdqv1s1laq6h5/Man_I_Need.mp3/file'
            }
        ];

        // ===== VARIABLES DE ESTADO =====
        let currentAlbum = null;
        let floatingVinyl = null;
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let isPlaying = false;
        let audioPlayer = document.getElementById('audioPlayer');

        // ===== INICIALIZACIÓN =====
        function init() {
            renderAlbums();
            setupAudioPlayer();
        }

        // ===== RENDERIZAR ÁLBUMES EN LA ESTANTERÍA =====
        function renderAlbums() {
            const display = document.getElementById('albumsDisplay');
            display.innerHTML = '';

            albums.forEach((album) => {
                const albumDiv = document.createElement('div');
                albumDiv.className = `album-item size-${album.size}`;
                albumDiv.id = `album-${album.id}`;
                albumDiv.innerHTML = `
                    <div class="album-package">
                        <img src="${album.cover}" alt="${album.name}" loading="lazy">
                    </div>
                    <div class="album-label">${album.name}</div>
                `;
                albumDiv.onclick = () => selectAlbum(album, albumDiv);
                display.appendChild(albumDiv);
            });
        }

        // ===== SELECCIONAR ÁLBUM (SACAR DE LA ESTANTERÍA) =====
        function selectAlbum(album, element) {
            // Remover selección anterior
            document.querySelectorAll('.album-item').forEach(el => {
                el.classList.remove('selected');
            });
            
            if (floatingVinyl) {
                floatingVinyl.remove();
                floatingVinyl = null;
            }

            element.classList.add('selected');

            // Crear vinilo flotante
            floatingVinyl = document.createElement('div');
            floatingVinyl.className = 'floating-vinyl';
            floatingVinyl.style.setProperty('--disc-image', `url('${album.disc}')`);
            floatingVinyl.innerHTML = `
                <div class="floating-vinyl-disc"></div>
            `;
            document.body.appendChild(floatingVinyl);

            // Posicionar en el elemento
            const rect = element.getBoundingClientRect();
            floatingVinyl.style.left = rect.left + rect.width / 2 - 90 + 'px';
            floatingVinyl.style.top = rect.top + 'px';

            // Animar hacia el centro
            setTimeout(() => {
                floatingVinyl.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                floatingVinyl.style.left = window.innerWidth / 2 - 90 + 'px';
                floatingVinyl.style.top = window.innerHeight / 2 - 90 + 'px';
            }, 10);

            // Hacer draggable
            floatingVinyl.addEventListener('mousedown', startDrag);
            floatingVinyl.addEventListener('touchstart', startDrag);

            currentAlbum = album;
            updateInfo(`"${album.name}" flotando. Arrastra al tocadiscos.`, false);
            document.getElementById('shelfStatus').textContent = '✓ Vinilo fuera del empaque...';
        }

        // ===== DRAG DEL VINILO FLOTANTE =====
        function startDrag(e) {
            isDragging = true;
            floatingVinyl.style.transition = 'none';
            floatingVinyl.classList.add('dragging');

            const rect = floatingVinyl.getBoundingClientRect();
            dragOffset.x = (e.clientX || e.touches[0].clientX) - rect.left;
            dragOffset.y = (e.clientY || e.touches[0].clientY) - rect.top;

            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function drag(e) {
            if (!isDragging || !floatingVinyl) return;

            const x = (e.clientX || e.touches[0].clientX) - dragOffset.x;
            const y = (e.clientY || e.touches[0].clientY) - dragOffset.y;

            floatingVinyl.style.left = x + 'px';
            floatingVinyl.style.top = y + 'px';

            checkDropZone(x, y);
        }

        function endDrag(e) {
            isDragging = false;
            if (floatingVinyl) floatingVinyl.classList.remove('dragging');
        }

        // ===== DETECCIÓN DE ZONA DE DROP =====
        function checkDropZone(x, y) {
            const turntable = document.getElementById('vinyDisc');
            const rect = turntable.getBoundingClientRect();

            const vinylCenterX = x + 90;
            const vinylCenterY = y + 90;
            const turntableCenterX = rect.left + rect.width / 2;
            const turntableCenterY = rect.top + rect.height / 2;

            const distance = Math.sqrt(
                Math.pow(vinylCenterX - turntableCenterX, 2) +
                Math.pow(vinylCenterY - turntableCenterY, 2)
            );

            if (distance < 100) {
                turntable.style.boxShadow = 'inset 0 -3px 10px rgba(0, 0, 0, 0.8), 0 0 40px rgba(76, 175, 80, 0.7)';
                turntable.style.transform = 'scale(1.05)';
            } else {
                turntable.style.boxShadow = 'inset 0 -3px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5)';
                turntable.style.transform = 'scale(1)';
            }
        }

        // Drop detection mejorado
        document.addEventListener('mouseup', function(e) {
            if (!isDragging || !floatingVinyl || !currentAlbum) return;

            const turntable = document.getElementById('vinyDisc');
            const rect = turntable.getBoundingClientRect();

            const vinylRect = floatingVinyl.getBoundingClientRect();
            const vinylCenterX = vinylRect.left + vinylRect.width / 2;
            const vinylCenterY = vinylRect.top + vinylRect.height / 2;
            const turntableCenterX = rect.left + rect.width / 2;
            const turntableCenterY = rect.top + rect.height / 2;

            const distance = Math.sqrt(
                Math.pow(vinylCenterX - turntableCenterX, 2) +
                Math.pow(vinylCenterY - turntableCenterY, 2)
            );

            if (distance < 100) {
                placeVinylOnTurntable();
            }

            turntable.style.boxShadow = 'inset 0 -3px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5)';
            turntable.style.transform = 'scale(1)';
        });

        // ===== COLOCAR VINILO EN TOCADISCOS =====
        function placeVinylOnTurntable() {
            const vinyDisc = document.getElementById('vinyDisc');
            const vinylCover = vinyDisc.querySelector('.vinyl-cover');

            // Animar vinilo flotante al tocadiscos
            floatingVinyl.style.transition = 'all 0.6s ease';
            floatingVinyl.style.left = window.innerWidth / 2 - 90 + 'px';
            floatingVinyl.style.top = window.innerHeight / 2 - 90 + 'px';
            floatingVinyl.style.opacity = '0';
            floatingVinyl.style.transform = 'scale(0.8)';

            setTimeout(() => {
                // Mostrar vinilo en el tocadiscos
                vinylCover.style.backgroundImage = `url('${currentAlbum.disc}')`;

                // Remover vinilo flotante
                if (floatingVinyl) {
                    floatingVinyl.remove();
                    floatingVinyl = null;
                }

                vinyDisc.classList.add('with-cover');

                // Actualizar info
                if (currentAlbum.audioUrl) {
                    updateInfo(`✓ "${currentAlbum.name}" en el tocadiscos. ¡Presiona REPRODUCIR!`, true);
                    document.getElementById('playBtn').disabled = false;
                } else {
                    updateInfo(`⚠ "${currentAlbum.name}" no tiene audio configurado`, false, true);
                    document.getElementById('playBtn').disabled = true;
                }

                document.getElementById('shelfStatus').textContent = '✓ Listo para reproducir';

                // Posicionar brazo en reposo
                const tonearm = document.getElementById('tonearm');
                tonearm.classList.remove('playing');
                tonearm.classList.add('in-rest');
            }, 600);
        }

        // ===== REPRODUCIR VINILO =====
        function playRecord() {
            if (!currentAlbum || !currentAlbum.audioUrl) {
                updateInfo('⚠ No hay audio configurado', false, true);
                return;
            }

            const tonearm = document.getElementById('tonearm');
            const turntable = document.getElementById('turntable');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');

            // Fase 1: Brazo se acerca (0.4s)
            tonearm.classList.remove('in-rest');
            setTimeout(() => {
                // Fase 2: Brazo se coloca (0.3s)
                tonearm.classList.add('playing');
                
                setTimeout(() => {
                    // Fase 3: Plato empieza a girar lentamente
                    turntable.classList.add('spinning');

                    // Acelerar progresivamente (1.5s)
                    let speed = 0;
                    const speedInterval = setInterval(() => {
                        speed += 0.2;
                        if (speed >= 1) {
                            clearInterval(speedInterval);
                            turntable.classList.remove('spinning');
                            turntable.classList.add('spinning', 'fast');
                        } else {
                            turntable.style.animationDuration = (3 - speed * 2.2) + 's';
                        }
                    }, 100);

                    // Reproducir audio directamente
                    audioPlayer.src = currentAlbum.audioUrl;
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        updateInfo(`♫ Reproduciendo "${currentAlbum.song}" de ${currentAlbum.name}...`, true);
                        document.getElementById('shelfStatus').textContent = '♫ Tocando...';
                    }).catch(err => {
                        console.error('Error al reproducir:', err);
                        updateInfo('⚠ Error al reproducir: ' + err.message, false, true);
                        stopRecord();
                    });

                    // Actualizar botones
                    playBtn.disabled = true;
                    stopBtn.disabled = false;

                    // Detectar fin
                    audioPlayer.onended = stopRecord;

                }, 300);
            }, 400);
        }

        // ===== DETENER VINILO =====
        function stopRecord() {
            if (!isPlaying && audioPlayer.currentTime === 0) return;

            const tonearm = document.getElementById('tonearm');
            const turntable = document.getElementById('turntable');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');

            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            isPlaying = false;

            // Desacelerar plato
            let speed = 1;
            const speedInterval = setInterval(() => {
                speed -= 0.2;
                if (speed <= 0) {
                    clearInterval(speedInterval);
                    turntable.classList.remove('spinning', 'fast');
                    turntable.style.animationDuration = '3s';
                    
                    // Brazo vuelve a reposo
                    tonearm.classList.remove('playing');
                    tonearm.classList.add('in-rest');
                } else {
                    turntable.style.animationDuration = (3 - speed * 2.2) + 's';
                }
            }, 100);

            // Actualizar botones
            playBtn.disabled = false;
            stopBtn.disabled = true;

            updateInfo(`✓ Reproducción completada.`, true);
            document.getElementById('shelfStatus').textContent = '⏹ Detenido';
        }

        // ===== UTILIDADES =====
        function setupAudioPlayer() {
            audioPlayer.addEventListener('play', () => {
                console.log('Reproduciendo:', currentAlbum?.song);
            });
        }

        function updateInfo(message, isSuccess = false, isWarning = false) {
            const infoBox = document.getElementById('infoBox');
            infoBox.textContent = message;
            infoBox.className = 'info-box';
            if (isSuccess) infoBox.classList.add('success');
            if (isWarning) infoBox.classList.add('warning');
        }

        // Iniciar
        init();
    </script>
</body>
</html>
